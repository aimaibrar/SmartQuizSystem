<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Smart Quiz System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Register</h2>
        <p class="subtitle">Create your new account</p>

        <div id="error-msg" class="alert alert-error hidden"></div>
        <div id="success-msg" class="alert alert-success hidden"></div>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="e.g. Full Name " />
        </div>

        <div class="form-group">
            <label>Registration No</label>
            <input type="text" id="regNo" placeholder="e.g. XXXX-XXX-XX" />
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Create a password" />
        </div>

        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="STUDENT">Student</option>
                <option value="ADMIN">Admin</option>
            </select>
        </div>

        <button class="btn full-width" onclick="register()">Register</button>

        <p class="link-text">Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>
<script src="js/register.js"></script>
</body>
</html>
