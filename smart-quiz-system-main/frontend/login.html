<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Smart Quiz System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Login</h2>
    <p class="subtitle">Enter your credentials to continue</p>

    <div id="error-msg" class="alert alert-error hidden"></div>
    <div id="success-msg" class="alert alert-success hidden"></div>

    <div class="form-group">
      <label>Registration No</label>
      <input type="text" id="regNo" placeholder="e.g XXXX-XXX-X " />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>

    <button class="btn full-width" onclick="login()">Login</button>

    <p class="link-text">Don't have an account? <a href="register.html">Register</a></p>
  </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
